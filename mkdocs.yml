site_name: Infrastructure Engineering Hub
site_url: https://kenanlalic.github.io/engineering-infrastructure-hub/
docs_dir: docs

theme:
  name: material

plugins:
  - search
  - callouts
  - ezlinks
  - redirects:
      redirect_maps:
        'index.md': '00-index/01-infrastructure-engineering-hub.md'

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: 00-index/01-infrastructure-engineering-hub.md
  - Workspace: 10-workspace-config/10-workspace-config.md
  - Base Infrastructure:
    - PostgreSQL: 20-base-infrastructure/20-postgresql.md
    - Envoy Gateway: 20-base-infrastructure/21-envoy-gateway.md
    - Keycloak: 20-base-infrastructure/22-keycloak-oidc.md
    - MailDev: 20-base-infrastructure/23-maildev.md
  - Django Template: 30-django-service-template/30-django-service-template.md
  - Kubernetes:
    - OCI Infrastructure: 40-kubernetes/40-oci-infrastructure.md
    - K8s Default Resources: 40-kubernetes/41-k8s-default-resources.md
