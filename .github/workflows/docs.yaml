name: Deploy Docs
on:
  push:
    branches: [main]
    paths: [docs/**, mkdocs.yml]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install mkdocs-material mkdocs-wikilinks-plugin mkdocs-redirects mkdocs-callouts
      - run: mkdocs gh-deploy --force
